<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Interactive Warp Page</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d110e; /* 极高级的暗色底 */
            touch-action: none;
        }
        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        // 创建后台高性能 Canvas，动态绘制高清的网页文本与排版
        const textureCanvas = document.createElement('canvas');
        textureCanvas.width = 2048;  // 超高分辨率保证文字极其清晰
        textureCanvas.height = 2048;
        const ctx = textureCanvas.getContext('2d');

        // 绘制高档现代网页背景与精细排版
        ctx.fillStyle = '#f4f6f4'; // 带有高级质感的微白纸张色
        ctx.fillRect(0, 0, 2048, 2048);

        // 模拟大牌官网的栅格线条
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.lineWidth = 2;
        for(let i = 200; i < 2048; i += 400) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 2048); ctx.stroke();
        }

        // 写入极具未来感的网页大标题
        ctx.fillStyle = '#050b08';
        ctx.font = 'bold 90px "Helvetica Neue", Helvetica, Arial, sans-serif';
        ctx.fillText('DESIGNED FOR PERFORMANCE', 150, 400);

        ctx.font = '100 55px "Helvetica Neue", Arial, sans-serif';
        ctx.fillStyle = '#2a4d3d';
        ctx.fillText('Built to run smoothly at 60FPS.', 150, 520);

        // 写入模拟的正文段落
        ctx.fillStyle = '#555555';
        ctx.font = '36px "Courier New", monospace';
        const lines = [
            "Translating costly DOM operations into core GPU threads.",
            "Warping standard HTML layouts within a custom WebGL context.",
            "Interaction proximity: active - Dynamic curvature enabled.",
            "Designed by CWJ-TOOLS // 2026 Ultimate Creative Engineering."
        ];
        lines.forEach((line, index) => {
            ctx.fillText(line, 150, 750 + index * 80);
        });

        // 绘制一些极简的技术几何色块
        ctx.fillStyle = '#3ae397';
        ctx.fillRect(150, 1100, 400, 15);
        ctx.fillStyle = '#050b08';
        ctx.fillRect(150, 1150, 800, 400);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px sans-serif';
        ctx.fillText('CORE GRAPHICS ENGINE ACTIVE', 220, 1380);
        // 核心技术：GPU 顶点着色器 (让整张网页像布料/纸张一样产生 3D 卷曲波浪)
        const vertexShader = `
            uniform float u_time;
            uniform vec2 u_pointer;
            uniform float u_waveIntensity;
            varying vec2 vUv;
            varying float vDepthShadow;

            void main() {
                vUv = uv;
                vec3 pos = position;

                // 算法 1：基础的飘动风吹波浪（模拟网页在空间中悬浮的呼吸感）
                float baseWave = sin(pos.x * 0.3 + u_time * 1.2) * cos(pos.y * 0.3 + u_time * 0.8) * 0.25;
                
                // 算法 2：手指触控引起的局部超强卷曲折叠（接近函数 Proximity 变形）
                float dist = distance(pos.xy, u_pointer * vec2(4.5, 3.0));
                float touchInfluence = smoothstep(3.5, 0.0, dist);
                
                // 综合变形：基础飘动 + 手指划过时的剧后凸起与卷曲
                pos.z += baseWave + (touchInfluence * u_waveIntensity * 2.2);
                
                // 给边缘增加一个类似高档胶片特有的自然反卷弧度
                pos.z += sin(pos.x * 0.15 - 1.0) * 0.4;

                vDepthShadow = pos.z; // 传递深度用于计算光影阴影
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        // 片元着色器：动态渲染网页材质并根据弯曲程度计算阴影，强化 3D 立体感
        const fragmentShader = `
            uniform sampler2D u_texture;
            varying vec2 vUv;
            varying float vDepthShadow;

            void main() {
                // 采样我们第一段在 Canvas 里画好的高清网页文字贴图
                vec4 texColor = texture2D(u_texture, vUv);
                
                // 依据网格的弯曲深度计算光影阴影（深的地方暗，凸起的地方亮，产生绝佳的立体折痕效果）
                float shadow = 0.85 + (vDepthShadow * 0.15);
                shadow = clamp(shadow, 0.6, 1.3);

                gl_FragColor = vec4(texColor.rgb * shadow, texColor.a);
            }
        `;

        // 初始化 Three.js 3D 舞台
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 将 Canvas 转化为 WebGL 硬件纹理
        const pageTexture = new THREE.CanvasTexture(textureCanvas);
        pageTexture.minFilter = THREE.LinearFilter;

        // 创建高密度网格面（128x128个细分格子，确保纸张弯曲时如丝般顺滑，毫无锯齿）
        const geometry = new THREE.PlaneGeometry(9, 6, 128, 128);

        // 绑定材质与 GPU 变量
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            side: THREE.DoubleSide, // 双面渲染，翻转过来也能看到网页背面
            uniforms: {
                u_texture: { value: pageTexture },
                u_time: { value: 0.0 },
                u_pointer: { value: new THREE.Vector2(0, 0) },
                u_waveIntensity: { value: 0.0 }
            }
        });

        const pageMesh = new THREE.Mesh(geometry, material);
        // 让整个网页稍微倾斜一点，更具 3D 空间透视感
        pageMesh.rotation.set(-0.15, -0.25, 0.05);
        scene.add(pageMesh);
        // 触摸与手势交互控制
        let pointer = new THREE.Vector2(0, 0);
        let targetIntensity = 0.0;
        let currentIntensity = 0.0;

        function updatePointer(x, y) {
            // 将屏幕坐标标准化为符合 3D 空间的规范化坐标 (-1 到 1)
            pointer.x = (x / window.innerWidth) * 2 - 1;
            pointer.y = -(y / window.innerHeight) * 2 + 1;
        }

        // 监听手指滑动和点击
        window.addEventListener('pointermove', (e) => {
            updatePointer(e.clientX, e.clientY);
        });

        window.addEventListener('pointerdown', (e) => {
            targetIntensity = 1.0; // 手指按下时，网页弯曲强度拉满
            updatePointer(e.clientX, e.clientY);
        });

        window.addEventListener('pointerup', () => {
            targetIntensity = 0.0; // 手指松开时，网页纸张恢复平整
        });

        // 适配手机屏幕旋转和尺寸缩放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        // 核心硬件渲染主循环
        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // 缓动阻尼算法：让网页在松开或按下时有真实的纸张回弹动画
            currentIntensity += (targetIntensity - currentIntensity) * 0.08;

            // 实时将物理数据推送给 GPU
            material.uniforms.u_time.value = time;
            material.uniforms.u_pointer.value.lerp(pointer, 0.1); // 手指位置平滑插值
            material.uniforms.u_waveIntensity.value = currentIntensity;

            // 渲染执行
            renderer.render(scene, camera);
        }

        // 引擎启动
        animate();
    </script>
</body>
</html>
