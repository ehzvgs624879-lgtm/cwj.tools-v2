<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ TOOLS V2</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#151520;
  --line:rgba(255,255,255,0.08);
  --text:#f2f2f5;
  --sub:#8b8b9a;
  --accent:#6366f1;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:var(--bg);
  color:var(--text);
}

/* 顶部 */
.header{
  position:sticky;
  top:0;
  z-index:10;
  padding:16px;
  background:rgba(10,10,15,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}

.title{
  font-size:20px;
  font-weight:700;
}

.sub{
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}

/* 搜索 */
.search{
  margin-top:10px;
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  outline:none;
}

/* 内容 */
.container{
  padding:12px;
}

/* 分组标题 */
.group{
  font-size:12px;
  color:var(--sub);
  margin:18px 6px 8px;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* 列表项（核心） */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.item:active{
  transform:scale(0.98);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon{
  font-size:20px;
  width:30px;
  text-align:center;
}

.name{
  font-size:14px;
  font-weight:600;
}

.desc{
  font-size:11px;
  color:var(--sub);
}

.arrow{
  color:var(--sub);
}

/* modal */
.modal-bg{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
}

.modal{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  width:80%;
  text-align:center;
}

.modal-bg.show{
  display:flex;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">CWJ TOOLS</div>
  <div class="sub">Mobile V2 System</div>
  <input class="search" id="search" placeholder="搜索工具...">
</div>

<div class="container">

  <div class="group">🤖 AI 工具</div>

  <div class="item" data-name="AI Chat">
    <div class="left">
      <div class="icon">🤖</div>
      <div>
        <div class="name">AI Chat</div>
        <div class="desc">智能对话</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="item" data-name="Translate">
    <div class="left">
      <div class="icon">🌐</div>
      <div>
        <div class="name">Translate</div>
        <div class="desc">多语言翻译</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="group">🔄 转换工具</div>

  <div class="item" data-name="File Convert">
    <div class="left">
      <div class="icon">📂</div>
      <div>
        <div class="name">File Convert</div>
        <div class="desc">文件格式转换</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="item" data-name="Timestamp">
    <div class="left">
      <div class="icon">🕒</div>
      <div>
        <div class="name">Timestamp</div>
        <div class="desc">时间戳转换</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="group">🔐 安全工具</div>

  <div class="item" data-name="Base64">
    <div class="left">
      <div class="icon">🔐</div>
      <div>
        <div class="name">Base64</div>
        <div class="desc">编码解码</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="item" data-name="Password Generator">
    <div class="left">
      <div class="icon">🔑</div>
      <div>
        <div class="name">Password Generator</div>
        <div class="desc">生成密码</div>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

</div>

<div class="modal-bg" id="modal">
  <div class="modal" id="modalText">即将上线</div>
</div>

<script>
const items = document.querySelectorAll('.item');
const modal = document.getElementById('modal');
const modalText = document.getElementById('modalText');
const search = document.getElementById('search');

items.forEach(i=>{
  i.addEventListener('click',()=>{
    modalText.innerText = i.dataset.name + " 即将上线";
    modal.classList.add('show');
  });
});

modal.addEventListener('click',()=>{
  modal.classList.remove('show');
});

search.addEventListener('input',()=>{
  const q = search.value.toLowerCase();

  items.forEach(i=>{
    const name = i.dataset.name.toLowerCase();
    i.style.display = name.includes(q) ? "flex" : "none";
  });
});
</script>

</body>
</html>
