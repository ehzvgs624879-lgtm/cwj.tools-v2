<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CWJ TOOLS PRO MAX</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg"></div>

<div class="app">

  <!-- 左侧控制栏 -->
  <aside class="sidebar">

    <div class="logo">
      CWJ TOOLS
    </div>

    <button onclick="setPage('home')">🏠 Home</button>
    <button onclick="setPage('chat')">💬 AI Chat</button>
    <button onclick="setPage('tools')">🧰 Tools</button>
    <button onclick="setPage('system')">⚙ System</button>

  </aside>

  <!-- 主区域 -->
  <main class="main">

    <!-- HOME -->
    <section id="homePage" class="page active">

      <div class="hero">
        <h1>CWJ TOOLS PRO MAX</h1>
        <p>AI CONTROL CENTER</p>
      </div>

      <div class="dashboard">

        <div class="card">
          <h3>AI STATUS</h3>
          <p>ONLINE</p>
        </div>

        <div class="card">
          <h3>SERVER</h3>
          <p>STABLE</p>
        </div>

        <div class="card">
          <h3>VERSION</h3>
          <p>PRO MAX</p>
        </div>

      </div>

    </section><!-- CHAT PAGE -->
    <section id="chatPage" class="page">

      <div class="chatContainer">

        <div class="chatHeader">
          💬 AI Assistant
        </div>

        <div id="chatOutput" class="chatOutput"></div>

        <div class="chatInputArea">

          <textarea id="input" placeholder="输入你的问题..."></textarea>

          <button onclick="send()">发送</button>

        </div>

      </div>

    </section>

    <!-- TOOLS PAGE -->
    <section id="toolsPage" class="page">

      <div class="grid">

        <div class="toolCard" onclick="alert('AI工具启动')">🤖 AI工具</div>
        <div class="toolCard" onclick="alert('翻译启动')">🌍 翻译</div>
        <div class="toolCard" onclick="alert('搜索启动')">🔍 搜索</div>
        <div class="toolCard" onclick="alert('文件系统')">📁 文件</div>

      </div>

    </section>

    <!-- SYSTEM PAGE -->
    <section id="systemPage" class="page">

      <div class="systemBox">

        <h2>System Status</h2>

        <p>API: ONLINE</p>
        <p>SERVER: OK</p>
        <p>AI ENGINE: ACTIVE</p>

      </div>

    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
