<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mathematical Interactive Space</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050b08;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            top: 8%;
            left: 6%;
            z-index: 10;
            color: #ffffff;
            pointer-events: none;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0 0 8px 0;
            line-height: 1.1;
            text-transform: uppercase;
        }
        p {
            font-size: 0.9rem;
            color: #5a8f76;
            margin: 0;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="webgl-container"></div>
    <div class="ui-overlay">
        <h1>MOSS<br>GEOMETRY</h1>
        <p>TOUCH & DRAG TO WARP THE NODES</p>
    </div>
    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 45);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const count = 60; 
        const spacing = 1.2; 
        const totalParticles = count * count;
        const positions = new Float32Array(totalParticles * 3);
        
        let idx = 0;
        for (let i = 0; i < count; i++) {
            for (let j = 0; j < count; j++) {
                positions[idx * 3] = (i - count / 2) * spacing;     
                positions[idx * 3 + 1] = 0;                         
                positions[idx * 3 + 2] = (j - count / 2) * spacing; 
                idx++;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            color: 0x3ae397, 
            size: 0.35,
            transparent: true,
            opacity: 0.75,
            blending: THREE.AdditiveBlending 
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        let mouseX = 0, mouseY = 0;     
        let targetX = 0, targetY = 0;   

        function handlePointer(x, y) {
            mouseX = (x / window.innerWidth) * 2 - 1;
            mouseY = -(y / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('mousemove', (e) => handlePointer(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                handlePointer(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const positionAttribute = geometry.attributes.position;
            
            targetX += (mouseX - targetX) * 0.08;
            targetY += (mouseY - targetY) * 0.08;

            particleSystem.rotation.y = time * 0.02;

            let pointerIdx = 0;
            for (let i = 0; i < count; i++) {
                for (let j = 0; j < count; j++) {
                    const x = positionAttribute.getX(pointerIdx);
                    const z = positionAttribute.getZ(pointerIdx);

                    let y = Math.sin(x * 0.15 + time) * 2.5 + Math.cos(z * 0.15 + time) * 2.5;

                    const influenceX = targetX * 35;
                    const influenceZ = -targetY * 35;
                    
                    const distance = Math.sqrt(Math.pow(x - influenceX, 2) + Math.pow(z - influenceZ, 2));

                    const maxDistance = 16; 
                    if (distance < maxDistance) {
                        const strength = (maxDistance - distance) / maxDistance;
                        y += Math.pow(strength, 2) * 12 * (Math.sin(time * 3) * 0.3 + 1);
                    }

                    positionAttribute.setY(pointerIdx, y);
                    pointerIdx++;
                }
            }

            positionAttribute.needsUpdate = true;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
