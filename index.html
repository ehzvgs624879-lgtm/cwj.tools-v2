<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CWJ Tools</title>
<link rel="stylesheet" href="style.css">

<!-- ===== 内联样式（保留你喜欢的版本） ===== -->
<style>
  .hero-banner {
    margin: 16px 16px 0 !important;
    padding: 12px 16px !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    gap: 12px !important;
  }
  .hero-title {
    font-size: 18px !important;
    font-weight: 600 !important;
    color: #f0f0f5 !important;
  }
  .hero-sub {
    font-size: 12px !important;
    color: rgba(240,240,245,0.3) !important;
    margin-top: 2px !important;
  }
  .hero-logo {
    width: 36px !important;
    height: 36px !important;
    font-size: 18px !important;
    font-weight: 700 !important;
    color: #fff !important;
    border-radius: 50% !important;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    flex-shrink: 0 !important;
  }

  .quick-grid {
    padding: 12px 16px !important;
    gap: 10px !important;
  }
  .quick-card {
    height: 56px !important;
    background: #16161f !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 14px !important;
    flex-direction: row !important;
    justify-content: flex-start !important;
    padding: 0 14px !important;
    gap: 12px !important;
    transition: background 0.15s !important;
  }
  .quick-card div {
    font-size: 20px !important;
  }
  .quick-card span {
    font-size: 14px !important;
    font-weight: 500 !important;
    color: #f0f0f5 !important;
  }
  .quick-card:active {
    background: #1e1e2a !important;
    transform: none !important;
  }

  .recent-card {
    border-radius: 14px !important;
    height: 72px !important;
    background: #16161f !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    padding: 10px 14px !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
    gap: 4px !important;
    flex-direction: column !important;
  }
  .recent-card-icon {
    font-size: 20px !important;
  }
  .recent-card-name {
    font-size: 11px !important;
    font-weight: 500 !important;
    color: rgba(240,240,245,0.55) !important;
  }
  .recent-card:active {
    background: #1e1e2a !important;
    transform: scale(0.95) !important;
  }
  .theme-toggle input:checked + span:first-of-type {
    background: #3b82f6 !important;
  }
  .theme-toggle input:checked + span + span {
    transform: translateX(20px) !important;
  }
</style>

</head>
<body style="background: linear-gradient(180deg, #0a0a0f 0%, #12121a 100%); background-attachment: fixed; margin: 0; padding: 0;">
<div class="toast" id="toast"></div>

<div class="app">

  <header class="top-bar">
    <div class="top-bar-logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">CWJ<strong>.tools</strong></span>
    </div>
    <button class="menu-btn" onclick="showPage('settings')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </header>

  <main class="main-content">

    <div class="page active" id="page-home">
      <div class="hero-banner">

  <div class="hero-logo">
    C
  </div>

  <div>
    <div class="hero-title">
      CWJ Tools
    </div>

    <div class="hero-sub">
      智能工具中心 
    </div>
  </div>

      </div>
      <div class="section">
        <div class="section-header">
          <span class="section-title">最近使用</span>
        </div>
        <div class="recent-scroll" id="recentList"></div>
      </div>
      <div id="homeSections"></div>
    </div>

    <div class="page" id="page-tools">
      <div class="search-wrap">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="searchInput" placeholder="搜索工具..." oninput="searchTools(this.value)">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
        </div>
      </div>
      <div id="searchResultsWrap" style="display:none">
        <div class="section">
          <div class="tool-list" id="searchResultsList"></div>
        </div>
      </div>
      <div id="allToolsList"></div>
    </div>

    <div class="page" id="page-settings">
      <div class="section">
        <div class="section-header">
          <span class="section-title">关于</span>
        </div>
        <div class="settings-card">
          <div class="settings-row">
            <span>应用名称</span>
            <span class="settings-value">CWJ Tools</span>
          </div>
          <div class="settings-row">
            <span>版本</span>
            <span class="settings-value">v2.0</span>
          </div>
          <div class="settings-row">
            <span>作者</span>
            <span class="settings-value">CWJ</span>
          </div>
          <div class="settings-row">
            <span>工具总数</span>
            <span class="settings-value" id="toolCount">-</span>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <span class="section-title">数据管理</span>
        </div>
        <div class="settings-card">
          <div class="settings-row clickable" onclick="clearRecent()">
            <span>清除最近使用记录</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
              <polyline points="3,6 5,6 21,6"/>
              <path d="M19,6l-1,14H6L5,6"/>
              <path d="M10,11v6"/><path d="M14,11v6"/>
              <path d="M8,6V4a1,1,0,0,1,1-1h6a1,1,0,0,1,1,1v2"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <span class="section-title">外观</span>
        </div>
        <div class="settings-card">
          <div class="settings-row">
            <span>浅色模式</span>
            <label class="theme-toggle" style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;">
              <input type="checkbox" id="lightModeToggle" onchange="toggleLightMode(this.checked)" style="opacity:0;width:0;height:0;">
              <span style="position:absolute;inset:0;background:#333;border-radius:24px;transition:0.2s;"></span>
              <span style="position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:0.2s;"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="showPage('home')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span>首页</span>
    </button>
    <button class="nav-item" id="nav-tools" onclick="showPage('tools')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>全部工具</span>
    </button>
    <button class="nav-item" id="nav-settings" onclick="showPage('settings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>设置</span>
    </button>
  </nav>

</div>

<div class="panel-overlay" id="overlay" onclick="closePanel(event)">
  <div class="panel" id="panel">
    <div class="panel-drag"></div>
    <div class="panel-header">
      <div class="panel-title" id="panelTitle"></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panelBody"></div>
  </div>
</div>

<script>
function toggleLightMode(checked) {
  if (checked) {
    document.body.classList.add('light-mode');
  } else {
    document.body.classList.remove('light-mode');
  }
  localStorage.setItem('lightMode', checked ? '1' : '0');
}
(function() {
  var saved = localStorage.getItem('lightMode');
  if (saved === '1') {
    document.body.classList.add('light-mode');
    window.addEventListener('DOMContentLoaded', function() {
      var t = document.getElementById('lightModeToggle');
      if (t) t.checked = true;
    });
  }
})();
</script>
<script src="script.js"></script>

<footer style="text-align: center; padding: 20px 16px; color: rgba(240,240,245,0.4); font-size: 12px;">
  © 2026 CWJ Tools
</footer>

</body>
</html>
