<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toast" id="toast"></div>
<canvas id="bg"></canvas>
<div class="wrapper">
<header>
  <div class="logo">CWJ<span>Tools</span></div>
  <nav><a href="#tools">工具</a><a href="#about">关于</a></nav>
</header>
<div class="hero">
  <h1>CWJ <span class="glow">TOOLS</span></h1>
  <p>/ cwj自主研发 · 高效 · 安全 · 极简 /</p>
</div>
<div class="tabs">
  <div class="tab active" onclick="filterTools('all',event)">全部</div>
  <div class="tab" onclick="filterTools('util',event)">实用工具</div>
  <div class="tab" onclick="filterTools('crypto',event)">加密安全</div>
  <div class="tab" onclick="filterTools('dev',event)">开发工具</div>
  <div class="tab" onclick="filterTools('ai',event)">AI 助手</div>
  <div class="tab" onclick="filterTools('net',event)">网络工具</div>
</div>
<div class="grid" id="toolGrid"></div>
</div>
<div class="panel-overlay" id="overlay" onclick="closePanel(event)">
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title" id="panelTitle"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panelBody"></div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
