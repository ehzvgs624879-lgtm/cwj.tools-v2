<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ Tools AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1117;
  color:#fff;
}

.topbar{
  padding:16px;
  background:#111116;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
}

.container{
  padding:16px;
}

.card{
  background:#1a1a22;
  padding:12px;
  border-radius:10px;
}

#chatBox{
  height:240px;
  overflow:auto;
  background:#111116;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2997ff;
  color:#fff;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="topbar">
CWJ Tools AI
</div>

<div class="container">

<div class="card">
  <h3>🤖 AI Chat（稳定版）</h3>

  <div id="chatBox"></div>

  <input id="input" placeholder="输入内容...">

  <button onclick="sendMessage()">发送</button>
</div>

</div>

<script>
function sendMessage(){
  const input = document.getElementById("input");
  const box = document.getElementById("chatBox");

  const text = input.value.trim();
  if(!text) return;

  // 用户消息
  box.innerHTML += "<div style='text-align:right;margin:5px 0'>你：" + text + "</div>";
  input.value = "";

  // AI回复（先稳定）
  box.innerHTML += "<div style='text-align:left;margin:5px 0'>AI：我已收到消息（当前为稳定测试版）</div>";

  box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
