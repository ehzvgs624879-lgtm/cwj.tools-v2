<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CWJ 工具箱 V10.5</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</head>

<body>

<div class="app">

    <!-- 左侧导航 -->
    <aside class="sidebar">

        <div class="logo">
            <div class="logo-circle"></div>
            <span>CWJ 工具箱</span>
        </div>

        <nav>

            <button class="nav-btn active" data-page="dashboard">
                <i class="fa-solid fa-house"></i>
                控制台
            </button>

            <button class="nav-btn" data-page="ai">
                <i class="fa-solid fa-robot"></i>
                AI工作台
            </button>

            <button class="nav-btn" data-page="tools">
                <i class="fa-solid fa-toolbox"></i>
                工具中心
            </button>

            <button class="nav-btn" data-page="files">
                <i class="fa-solid fa-file"></i>
                文件中心
            </button>

            <button class="nav-btn" data-page="search">
                <i class="fa-solid fa-magnifying-glass"></i>
                搜索中心
            </button>

            <button class="nav-btn" data-page="developer">
                <i class="fa-solid fa-code"></i>
                开发工具
            </button>

        </nav>

    </aside>

    <!-- 主体 -->
    <main class="main">

        <!-- 顶部栏 -->
        <header class="topbar">

            <div class="search-box">
                <input type="text" placeholder="搜索 CWJ 工具...">
            </div>

            <div class="status">
                <span class="online"></span>
                系统在线
            </div>

        </header>

        <!-- 控制台 -->
        <section class="page active" id="dashboard">

            <div class="hero-card">

                <h1>CWJ 工具箱 V10.5</h1>

                <p>AI + 实用工具 + 开发者平台</p>

            </div>

            <div class="grid">

                <div class="card">
                    <i class="fa-solid fa-robot"></i>
                    <h3>AI智能助手</h3>
                    <p>聊天 · 翻译 · 写作</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-toolbox"></i>
                    <h3>实用工具</h3>
                    <p>密码 · UUID · JSON</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-file"></i>
                    <h3>文件处理</h3>
                    <p>PDF · 图片 · OCR</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <h3>搜索引擎</h3>
                    <p>网页搜索 · AI搜索</p>
                </div>

            </div>

        </section>

        <!-- AI -->
        <section class="page" id="ai">

            <div class="panel">

                <h2>AI智能工作台</h2>

                <div class="chat-box" id="chatBox">

                    <div class="message bot">
                        欢迎使用 CWJ AI 助手
                    </div>

                </div>

                <div class="chat-input">

                    <input id="userInput" placeholder="输入你的问题..." />

                    <button id="sendBtn">发送</button>

                </div>

            </div>

        </section>

        <!-- 工具中心 -->
        <section class="page" id="tools">

            <div class="grid">

                <div class="card tool-card">
                    密码生成器
                </div>

                <div class="card tool-card">
                    UUID生成器
                </div>

                <div class="card tool-card">
                    Base64工具
                </div>

                <div class="card tool-card">
                    JSON格式化
                </div>

            </div>

        </section>

        <!-- 文件中心 -->
        <section class="page" id="files">

            <div class="grid">

                <div class="card">PDF工具</div>
                <div class="card">图片处理</div>
                <div class="card">OCR识别</div>
                <div class="card">文件压缩</div>

            </div>

        </section>

        <!-- 搜索中心 -->
        <section class="page" id="search">

            <div class="panel">

                <h2>搜索中心</h2>

                <input class="search-center" placeholder="输入关键词搜索..." />

            </div>

        </section>

        <!-- 开发工具 -->
        <section class="page" id="developer">

            <div class="grid">

                <div class="card">API测试</div>
                <div class="card">Base64编码</div>
                <div class="card">JWT解析</div>
                <div class="card">正则工具</div>

            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
