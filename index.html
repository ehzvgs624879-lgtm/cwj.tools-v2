<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>未命名空间</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #09090b; color: #10b981; font-family: monospace; }
        .box { text-align: center; padding: 20px; }
        .btn { background: #ef4444; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 15px rgba(239,68,68,0.4); margin-bottom: 20px; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.95); background: #dc2626; }
        #msg { font-size: 18px; min-height: 30px; font-weight: bold; padding: 0 20px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box">
        <button class="btn" onclick="hitMe()">⚠️ 千万别点我</button>
        <div id="msg">...</div>
    </div>
    <script>
        // 下面括号里的双引号内容，就是你可以随便改的恶搞文案！
        const jokes = [
            "不是告诉你别点了吗？",
            "你的手机将在 10 秒后自毁 💥",
            "再点一下试试？",
            "V我50，告诉你宇宙的终极秘密",
            "正在格式化系统... 99% 💀",
            "🎉 恭喜你发现了一个毫无卵用的按钮！",
            "别点了，老板在你身后看着你呢 👁️"
        ];
        function hitMe() {
            let r = Math.floor(Math.random() * jokes.length);
            document.getElementById('msg').innerText = jokes[r];
        }
    </script>
</body>
</html>
