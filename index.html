<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate WebGL Shaders</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010202; /* 极暗深渊色 */
            font-family: -apple-system, sans-serif;
            touch-action: none;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; color: white; pointer-events: none; mix-blend-mode: overlay;
        }
        h1 { font-size: 3rem; font-weight: 100; letter-spacing: 1rem; margin: 0; opacity: 0.8; }
        p { font-size: 0.8rem; letter-spacing: 0.5rem; opacity: 0.5; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        <h1>FLUID</h1>
        <p>TOUCH THE ENTITY</p>
    </div>

    <script>
        // 核心技术：顶点着色器 (Vertex Shader) - 控制 3D 几何体的极度扭曲
        const vertexShader = `
            uniform float u_time;
            uniform float u_intensity;
            varying vec2 vUv;
            varying float vDisplacement;

            // GPU 级 3D 噪波算法 (Simplex Noise)
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( 
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                          + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                          + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 1.0/7.0;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vUv = uv;
                // 利用 GPU 计算极度复杂的流体力学扭曲
                float noise = snoise(vec3(position.x * 1.5, position.y * 1.5 + u_time * 0.3, position.z * 1.5));
                
                // 触摸时的狂暴模式
                float distortion = noise * (0.8 + u_intensity * 3.5);
                vDisplacement = distortion;
                
                vec3 newPosition = position + normal * (distortion * 0.5);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;
        // 核心技术：片元着色器 (Fragment Shader) - GPU 级光影与全息色彩渲染
        const fragmentShader = `
            uniform float u_intensity;
            uniform float u_time;
            varying vec2 vUv;
            varying float vDisplacement;

            // 宇宙级余弦渐变算法 (Cosine Color Palette)
            vec3 palette( in float t, in vec3 a, in vec3 b, in vec3 c, in vec3 d ) {
                return a + b * cos( 6.28318 * (c * t + d) );
            }

            void main() {
                // 根据物体的扭曲程度和时间，生成梦幻的颜色
                float distort = vDisplacement * 0.5 + 0.5;
                
                // 基础色：深空绿 ➔ 爆发色：赛博粉蓝
                vec3 colorA = vec3(0.05, 0.2, 0.1); 
                vec3 colorB = vec3(0.2, 0.8, 0.5); 
                vec3 colorC = vec3(1.0, 1.0, 1.0); 
                vec3 colorD = vec3(0.0, 0.33, 0.67); 
                
                // 根据手指按下强度混合色板
                vec3 finalColor = palette(distort - u_time * 0.1 + (u_intensity * 0.5), colorA, colorB, colorC, colorD);
                
                // 边缘发光效应 (Fresnel 模拟)
                float glow = smoothstep(0.0, 1.2, distort);
                finalColor += vec3(glow * 0.3) * u_intensity;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 创建高精度几何体 (Icosahedron - 128个面细分，总计几万个顶点供显卡扭曲)
        const geometry = new THREE.IcosahedronGeometry(2, 128);

        // 将显卡着色器绑定到材质上
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                u_time: { value: 0.0 },
                u_intensity: { value: 0.0 }
            },
            wireframe: false // 设置为 true 就可以看到震撼的网格撕裂效果
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        let isTouching = false;
        let targetIntensity = 0.0;
        let currentIntensity = 0.0;

        // 交互监听
        const onTouchStart = () => { isTouching = true; targetIntensity = 1.0; };
        const onTouchEnd = () => { isTouching = false; targetIntensity = 0.0; };

        window.addEventListener('mousedown', onTouchStart);
        window.addEventListener('mouseup', onTouchEnd);
        window.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('touchend', onTouchEnd);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            
            // 弹性阻尼算法：让交互过渡如丝般顺滑
            currentIntensity += (targetIntensity - currentIntensity) * 0.05;

            // 实时将数据传递给 GPU 着色器
            material.uniforms.u_time.value = time;
            material.uniforms.u_intensity.value = currentIntensity;

            // 整体缓慢自转，触摸时急剧翻滚
            mesh.rotation.y = time * 0.1 + (currentIntensity * 2.0);
            mesh.rotation.x = time * 0.05 + (currentIntensity * 1.5);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
