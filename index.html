<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"><title>交互引力场 | 粒子随动</title>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}body {
    background: #030705;
    overflow: hidden;
    touch-action: none;
}canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    cursor: none;
}        .hint {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(180,240,150,0.7);
            font-size: 12px;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 16px;
            border-radius: 40px;
        }
    </style>
</head>
<body><canvas id="canvas"></canvas>
<div class="hint">⚡ 手指 / 鼠标移动 → 粒子吸引 + 涡旋扭曲 ⚡</div>
<script>(function(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    let particles = [];let pointerX = -1000, pointerY = -1000;
let pointerActive = false;
let PARTICLE_COUNT = 150;class Particle {
    constructor(x, y, vx, vy, size, hue) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.size = size;
        this.hue = hue;
        this.alpha = 0.5 + Math.random() * 0.5;
    }update() {
    this.vx += (Math.random() - 0.5) * 0.2;
    this.vy += (Math.random() - 0.5) * 0.2;
    let maxSpd = 1.3;
    if (Math.abs(this.vx) > maxSpd) this.vx = this.vx > 0 ? maxSpd : -maxSpd;
    if (Math.abs(this.vy) > maxSpd) this.vy = this.vy > 0 ? maxSpd : -maxSpd;
    this.x += this.vx;
    this.y += this.vy;if (this.x < -60) this.x = w + 60;
if (this.x > w + 60) this.x = -60;
if (this.y < -60) this.y = h + 60;
if (this.y > h + 60) this.y = -60;if (pointerActive && pointerX > 0 && pointerY > 0) {
    let dx = this.x - pointerX;
    let dy = this.y - pointerY;
    let dist = Math.hypot(dx, dy);
    let radius = 130;
    if (dist < radius) {
        let force = (radius - dist) / radius;
        let angle = Math.atan2(dy, dx);
        this.vx -= Math.cos(angle) * force * 0.7;
        this.vy -= Math.sin(angle) * force * 0.7;
        let perpX = -Math.sin(angle);
        let perpY = Math.cos(angle);
        this.vx += perpX * force * 0.5;
        this.vy += perpY * force * 0.5;
    }
}    this.vx *= 0.992;
    this.vy *= 0.992;
    }    draw() {
        let spd = Math.hypot(this.vx, this.vy);
        let dynHue = (this.hue + spd * 20) % 360;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (0.6 + spd * 0.6), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${dynHue}, 80%, 65%, ${this.alpha})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${dynHue}, 90%, 75%, 0.7)`;
        ctx.fill();
    }
}function initParticles() {
    particles = [];
    if (w < 768) PARTICLE_COUNT = 120;
    else if (w < 1200) PARTICLE_COUNT = 160;
    else PARTICLE_COUNT = 200;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        let x = Math.random() * w;
        let y = Math.random() * h;
        let vx = (Math.random() - 0.5) * 0.6;
        let vy = (Math.random() - 0.5) * 0.6;
        let size = 2 + Math.random() * 4;
        let hue = 80 + Math.random() * 60;
        particles.push(new Particle(x, y, vx, vy, size, hue));
    }
}function drawGrid() {
    let cell = 45;
    ctx.strokeStyle = "rgba(100,180,100,0.2)";
    ctx.lineWidth = 0.8;
    for (let x = 0; x < w; x += cell) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    for (let y = 0; y < h; y += cell) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
}function drawConnections() {
    ctx.lineWidth = 0.6;
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j += 5) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.hypot(dx, dy);
            if (dist < 85) {
                let opacity = (1 - dist / 85) * 0.25;
                ctx.strokeStyle = `rgba(150,220,120,${opacity})`;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}function animate() {
    ctx.fillStyle = "rgba(5,11,8,0.18)";
    ctx.fillRect(0, 0, w, h);
    drawGrid();
    for (let p of particles) {
        p.update();
        p.draw();
    }
    drawConnections();
    if (pointerActive && pointerX > 0 && pointerY > 0) {
        ctx.beginPath();
        ctx.arc(pointerX, pointerY, 28, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(180,255,140,0.6)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(pointerX, pointerY, 12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(100,200,80,0.3)";
        ctx.fill();
    }
    requestAnimationFrame(animate);
}function resizeCanvas() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
    initParticles();
}function handleMove(clientX, clientY) {
    pointerX = clientX;
    pointerY = clientY;
    pointerActive = true;
    for (let p of particles) {
        let dx = p.x - pointerX;
        let dy = p.y - pointerY;
        let dist = Math.hypot(dx, dy);
        if (dist < 100) {
            let angle = Math.atan2(dy, dx);
            let force = (100 - dist) / 800;
            p.vx += Math.cos(angle) * force * 1.2;
            p.vy += Math.sin(angle) * force * 1.2;
        }
    }
}function handleEnd() {
    pointerActive = false;
    pointerX = -1000;
    pointerY = -1000;
}window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
window.addEventListener('mouseleave', handleEnd);window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });window.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY);
});window.addEventListener('touchend', handleEnd);
window.addEventListener('touchcancel', handleEnd);window.addEventListener('resize', () => resizeCanvas());
resizeCanvas();
animate();        })();
    </script>
</body>
</html>
