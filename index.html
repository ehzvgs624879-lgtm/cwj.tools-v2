<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Nexus Tools | AI Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar glass-panel">
      <div class="logo">
        <i data-lucide="hexagon"></i>
        <span>Nexus<span class="gradient-text">Tools</span></span>
      </div>
      <nav class="nav-menu">
        <div class="nav-label">Overview</div>
        <a href="#" class="nav-item active" data-target="view-home"><i data-lucide="layout-grid"></i> 工具主页</a>
        <div class="nav-label">AI & Intelligence</div>
        <a href="#" class="nav-item" data-target="view-ai"><i data-lucide="bot"></i> AI 聊天助手</a>
        <div class="nav-label">Utilities</div>
        <a href="#" class="nav-item" data-target="view-text"><i data-lucide="file-text"></i> 文本工具</a>
        <a href="#" class="nav-item" data-target="view-json"><i data-lucide="braces"></i> JSON 工具</a>
        <a href="#" class="nav-item" data-target="view-calc"><i data-lucide="calculator"></i> 计算器</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="top-header glass-panel">
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" id="global-search" placeholder="搜索工具 (Search tools...)">
        </div>
        <div class="user-profile"><div class="avatar"><i data-lucide="user"></i></div></div>
      </header>      <div class="view-container">
        <section id="view-home" class="view active">
          <div class="view-header">
            <h1>欢迎回来</h1>
            <p>选择一个工具开始今天的工作。</p>
          </div>
          <div class="tools-grid" id="tools-grid">
            <div class="tool-card glass-panel" data-target="view-ai">
              <div class="card-icon" style="background: rgba(99, 102, 241, 0.1); color: #818cf8;"><i data-lucide="bot"></i></div>
              <h3>AI 聊天助手</h3>
              <p>智能对话，代码编写，问题解答。</p>
            </div>
            <div class="tool-card glass-panel" data-target="view-text">
              <div class="card-icon" style="background: rgba(16, 185, 129, 0.1); color: #34d399;"><i data-lucide="file-text"></i></div>
              <h3>文本工具</h3>
              <p>一键总结、翻译与文本重写。</p>
            </div>
            <div class="tool-card glass-panel" data-target="view-json">
              <div class="card-icon" style="background: rgba(245, 158, 11, 0.1); color: #fbbf24;"><i data-lucide="braces"></i></div>
              <h3>JSON 工具</h3>
              <p>快速格式化、压缩与校验 JSON 数据。</p>
            </div>
            <div class="tool-card glass-panel" data-target="view-calc">
              <div class="card-icon" style="background: rgba(236, 72, 153, 0.1); color: #f472b6;"><i data-lucide="calculator"></i></div>
              <h3>极简计算器</h3>
              <p>日常快捷计算工具。</p>
            </div>
          </div>
        </section>
        <section id="view-ai" class="view">
          <div class="chat-container glass-panel">
            <div class="chat-messages" id="chat-messages">
              <div class="message ai-message">
                <div class="avatar"><i data-lucide="bot"></i></div>
                <div class="content">你好，我是 Nexus AI。有什么我可以帮你的吗？</div>
              </div>
            </div>
            <div class="chat-input-area">
              <textarea id="chat-input" placeholder="输入你想问的问题... (Enter 发送)"></textarea>
              <button id="btn-send-chat" class="btn-primary"><i data-lucide="send"></i></button>
            </div>
          </div>
        </section>        <section id="view-text" class="view">
          <div class="tool-layout">
            <div class="input-panel glass-panel">
              <h3>输入文本</h3>
              <textarea id="text-input" placeholder="在此粘贴或输入需要处理的文本..."></textarea>
              <div class="action-buttons">
                <button class="btn-secondary" onclick="processText('summarize')">文本总结</button>
                <button class="btn-secondary" onclick="processText('translate')">中英翻译</button>
                <button class="btn-secondary" onclick="processText('rewrite')">润色改写</button>
              </div>
            </div>
            <div class="output-panel glass-panel">
              <h3>处理结果</h3>
              <div id="text-output" class="result-box">等待操作...</div>
            </div>
          </div>
        </section>
        <section id="view-json" class="view">
          <div class="tool-layout">
            <div class="input-panel glass-panel">
              <h3>JSON 输入</h3>
              <textarea id="json-input" placeholder='{"key": "value"}'></textarea>
              <div class="action-buttons">
                <button class="btn-secondary" onclick="processJSON('format')">格式化 / 美化</button>
                <button class="btn-secondary" onclick="processJSON('compress')">压缩 JSON</button>
              </div>
            </div>
            <div class="output-panel glass-panel">
              <h3>JSON 输出</h3>
              <textarea id="json-output" class="result-box" readonly></textarea>
            </div>
          </div>
        </section>
        <section id="view-calc" class="view">
          <div class="calc-container glass-panel">
            <div class="calc-display" id="calc-display">0</div>
            <div class="calc-keys">
              <button class="calc-btn utility" onclick="calcAction('clear')">AC</button>
              <button class="calc-btn utility" onclick="calcAction('delete')">DEL</button>
              <button class="calc-btn utility" onclick="calcAction('%')">%</button>
              <button class="calc-btn operator" onclick="calcAction('/')">/</button>
              <button class="calc-btn" onclick="calcAction('7')">7</button>
              <button class="calc-btn" onclick="calcAction('8')">8</button>
              <button class="calc-btn" onclick="calcAction('9')">9</button>
              <button class="calc-btn operator" onclick="calcAction('*')">×</button>
              <button class="calc-btn" onclick="calcAction('4')">4</button>
              <button class="calc-btn" onclick="calcAction('5')">5</button>
              <button class="calc-btn" onclick="calcAction('6')">6</button>
              <button class="calc-btn operator" onclick="calcAction('-')">-</button>
              <button class="calc-btn" onclick="calcAction('1')">1</button>
              <button class="calc-btn" onclick="calcAction('2')">2</button>
              <button class="calc-btn" onclick="calcAction('3')">3</button>
              <button class="calc-btn operator" onclick="calcAction('+')">+</button>
              <button class="calc-btn zero" onclick="calcAction('0')">0</button>
              <button class="calc-btn" onclick="calcAction('.')">.</button>
              <button class="calc-btn operator equals" onclick="calcAction('=')">=</button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
