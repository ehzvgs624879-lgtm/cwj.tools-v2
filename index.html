<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus Train</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; background: black; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="text-white h-screen w-screen font-sans">

    <div class="absolute inset-0 z-0 bg-neutral-900">
        <video id="bgVideo" autoplay loop muted playsinline poster="https://images.unsplash.com/photo-1505118380757-91f5f5632de0?auto=format&fit=crop&w=1000&q=80" class="w-full h-full object-cover brightness-[0.6] transition-all duration-1000">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-coming-to-the-beach-5044-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="absolute inset-0 z-20 flex flex-col justify-between p-8 text-center">
        <div class="mt-8 opacity-70 text-xs tracking-[0.3em] uppercase">RAILROAD.AI</div>
        
        <div id="main-container" class="my-auto">
            <div id="home-view" class="space-y-6 animate-fade">
                <h1 class="text-3xl font-light">Focus in a Constantly<br><span class="font-normal opacity-90">Distracted World</span></h1>
                <p class="text-xs text-neutral-400 max-w-xs mx-auto">屏蔽通知、信息流与无休止的打扰。在这里找回你的专注。</p>
                <button onclick="startFocus()" class="bg-white text-black py-3 px-8 rounded-full text-sm font-medium active:scale-95 transition-all">开始专注</button>
            </div>
            <div id="focus-view" class="hidden space-y-6 animate-fade">
                <div id="countdown" class="text-7xl font-extralight tabular-nums">25:00</div>
                <div class="flex gap-4 justify-center">
                    <button onclick="togglePause()" id="pauseBtn" class="bg-white/10 py-2 px-6 rounded-full text-xs">暂停</button>
                    <button onclick="quitFocus()" class="bg-black/20 py-2 px-6 rounded-full text-xs border border-white/10">放弃</button>
                </div>
            </div>
        </div>
        
        <div class="mb-4 opacity-50 text-[10px]">© 2026 Focus Mode</div>
    </div>
    <audio id="bgAudio" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/02/22/audio_d1718ab41b.mp3" type="audio/mpeg">
    </audio>

    <script>
        let timer = null, timeLeft = 1500, isPaused = false;
        const bgVideo = document.getElementById('bgVideo'), bgAudio = document.getElementById('bgAudio');
        const homeView = document.getElementById('home-view'), focusView = document.getElementById('focus-view');
        
        function startFocus() {
            homeView.classList.add('hidden');
            focusView.classList.remove('hidden');
            bgVideo.style.filter = "brightness(0.25)";
            bgAudio.play();
            timer = setInterval(() => {
                if (!isPaused && timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('countdown').textContent = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
            isPaused ? bgAudio.pause() : bgAudio.play();
        }

        function quitFocus() {
            clearInterval(timer);
            bgVideo.style.filter = "brightness(0.6)";
            bgAudio.pause();
            bgAudio.currentTime = 0;
            focusView.classList.add('hidden');
            homeView.classList.remove('hidden');
            timeLeft = 1500;
        }
    </script>
</body>
</html>
