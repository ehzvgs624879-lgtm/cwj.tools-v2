<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CWJ Tools V11</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="logo">CWJ TOOLS</div>

    <button class="nav-btn active" data-page="dashboard">控制台</button>
    <button class="nav-btn" data-page="tools">工具中心</button>
    <button class="nav-btn" data-page="ai">AI聊天</button>
    <button class="nav-btn" data-page="files">文件中心</button>
    <button class="nav-btn" data-page="search">搜索</button>
    <button class="nav-btn" data-page="dev">开发工具</button>

</aside>

<!-- MAIN -->
<main class="main">

<!-- DASHBOARD -->
<section class="page active" id="dashboard">
    <h1>🚀 CWJ Tools V11</h1>
    <p>稳定重构版本</p>
</section>

<!-- TOOLS -->
<section class="page" id="tools">

<div class="tool-layout">

    <div class="tool-list">

        <div class="tool-item active" data-tool="password">🔐 密码生成</div>
        <div class="tool-item" data-tool="uuid">🆔 UUID生成</div>
        <div class="tool-item" data-tool="base64">🔤 Base64</div>
        <div class="tool-item" data-tool="json">📦 JSON格式化</div>

    </div>

    <div class="tool-center">

        <h2 id="toolTitle">密码生成</h2>

        <textarea id="toolInput" placeholder="输入内容..."></textarea>

        <button id="runTool">运行工具</button>

    </div>

    <div class="tool-output">

        <h3>输出</h3>

        <pre id="toolResult">等待执行...</pre>

        <button onclick="copyResult()">复制</button>

    </div>

</div>

</section>

<!-- AI -->
<section class="page" id="ai">

    <div class="ai-box">

        <div id="chatBox"></div>

        <input id="userInput" placeholder="输入..." />
        <button id="sendBtn">发送</button>

    </div>

</section>

<!-- FILES -->
<section class="page" id="files">
    <h2>文件中心</h2>
</section>

<!-- SEARCH -->
<section class="page" id="search">
    <input class="search-center" placeholder="搜索..." />
</section>

<!-- DEV -->
<section class="page" id="dev">
    <h2>开发工具</h2>
</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
