<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ Tools AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1117;
  color:#fff;
}

.topbar{
  padding:16px;
  background:#111116;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
}

.container{
  padding:16px;
}

.card{
  background:#1a1a22;
  padding:12px;
  border-radius:10px;
}

#chatBox{
  height:240px;
  overflow:auto;
  background:#111116;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2997ff;
  color:#fff;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="topbar">
CWJ Tools AI
</div>

<div class="container">

<div class="card">
  <h3>🤖 AI Chat（稳定版）</h3>

  <div id="chatBox"></div>

  <input id="input" placeholder="输入内容...">

  <button onclick="sendMessage()">发送</button>
</div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("input");
    const box = document.getElementById("chatBox");

    const text = input.value.trim();
    if (!text) return;

    // 1. 显示用户发送的消息 (保留了你界面里的蓝色背景样式)
    const userDiv = document.createElement("div");
    userDiv.style = "background:#4f7cff; padding:8px; margin:8px 0; border-radius:8px; text-align:right;";
    userDiv.innerText = text;
    box.appendChild(userDiv);

    input.value = "";
    box.scrollTop = box.scrollHeight;

    // 2. 创建一个 AI 正在思考的提示框
    const aiDiv = document.createElement("div");
    aiDiv.style = "background:#2a2f3a; padding:8px; margin:8px 0; border-radius:8px; text-align:left;";
    aiDiv.innerText = "AI 思考中...";
    box.appendChild(aiDiv);
    box.scrollTop = box.scrollHeight;

    // 3. 联网请求 API
    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        const replyText = data.reply || data.content || (data.choices && data.choices[0].message.content) || "未收到有效回复";

        // 4. 把思考中换成真正的 AI 回复
        aiDiv.innerText = replyText;
    } catch (error) {
        aiDiv.innerText = "出错了: " + error.message;
    }

    box.scrollTop = box.scrollHeight;
}
</script>


</body>
</html>
