<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CWJ TOOLS</title>

  <!-- ✔ CSS闭环 -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="bg"></div>

  <div class="app">

    <aside class="sidebar">
      <h2>CWJ TOOLS</h2>

      <button onclick="setMode('chat')">AI Chat</button>
      <button onclick="setMode('tools')">Tools</button>
      <button onclick="setMode('system')">System</button>
    </aside>

    <main class="main">

  <div class="hero">
    <h1>CWJ TOOLS</h1>
    <p>AI OPERATING CENTER</p>
  </div>

  <div class="status-grid">

    <div class="card">
      <span>AI状态</span>
      <h2>ONLINE</h2>
    </div>

    <div class="card">
      <span>版本</span>
      <h2>V9 PRO</h2>
    </div>

    <div class="card">
      <span>系统</span>
      <h2>NORMAL</h2>
    </div>

  </div>

  <div id="chatBox" class="panel active">

    <div class="chat-card">

      <div class="chat-header">
        CWJ AI Assistant
      </div>

      <textarea
        id="input"
        placeholder="输入你的问题..."
      ></textarea>

      <button class="send-btn" onclick="send()">
        发送消息
      </button>

      <div id="output" class="output"></div>

    </div>

  </div>

  <div id="toolsBox" class="panel">

    <div class="tools-grid">

      <div class="tool-card">AI工具</div>
      <div class="tool-card">翻译工具</div>
      <div class="tool-card">搜索工具</div>
      <div class="tool-card">文件处理</div>

    </div>

  </div>

  <div id="systemBox" class="panel">

    <div class="chat-card">
      <h2>系统状态</h2>

      <p>API ONLINE</p>
      <p>Vercel ONLINE</p>
      <p>Version V9 PRO</p>

    </div>

  </div>

    </main>

  </div>

  <!-- ✔ JS闭环 -->
  <script src="app.js"></script>
</body>
</html>
