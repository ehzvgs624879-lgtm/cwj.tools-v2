<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CWJ Tools Mobile OS</title>
  <style>
    :root {
      --bg-primary: #F2F2F7;
      --bg-card: #FFFFFF;
      --bg-input: #F2F2F7;
      --text-primary: #1C1C1E;
      --text-secondary: #8E8E93;
      --accent: #007AFF;
      --danger: #FF3B30;
      --radius-card: 16px;
      --radius-input: 12px;
      --radius-btn: 12px;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter','SF Pro',sans-serif;}
    body { background:var(--bg-primary); color:var(--text-primary); overflow:hidden; }
    #app { display:flex; flex-direction:column; height:100vh; }
    header { padding: env(safe-area-inset-top) var(--spacing-md) var(--spacing-sm); font-size:20px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
    #page-container { flex:1; overflow:auto; position:relative; }
    .page { display:none; flex-direction:column; height:100%; width:100%; position:absolute; top:0; left:0; }
    .page.active { display:flex; }
    .slide-in { animation: slideIn 0.25s ease forwards; }
    .slide-out { animation: slideOut 0.25s ease forwards; }
    @keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes slideOut { from { transform:translateX(0); } to { transform:translateX(100%); } }

    /* TabBar */
    #tab-bar { display:flex; justify-content:space-around; padding: env(safe-area-inset-bottom) var(--spacing-md) var(--spacing-sm); border-top:1px solid #ccc; background:var(--bg-primary); }
    #tab-bar button { flex:1; background:none; border:none; font-size:14px; color:var(--text-secondary); padding:10px; }
    #tab-bar button.active { color:var(--accent); font-weight:600; }

    /* Card style */
    .tool-card { background:var(--bg-card); border-radius:var(--radius-card); box-shadow:var(--shadow-card); padding:var(--spacing-md); margin-bottom:var(--spacing-md); display:flex; flex-direction:column; cursor:pointer; transition:transform 0.15s ease; }
    .tool-card:hover { transform:scale(0.98); }
    .tool-title { font-size:16px; font-weight:600; margin-bottom:4px; }
    .tool-desc { font-size:13px; color:var(--text-secondary); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div>CWJ Tools</div>
      <div>⚙️</div>
    </header>
    <div id="page-container">
      <div id="page-home" class="page active">
        <div style="padding: var(--spacing-md);">
          <input type="text" id="search-input" placeholder="搜索工具…" style="width:100%; padding:12px var(--spacing-md); border:none; border-radius:var(--radius-input); box-shadow:var(--shadow-card); margin-bottom:var(--spacing-md);">
          <div id="tool-list">
            <!-- 工具卡片通过JS渲染 -->
          </div>
        </div>
      </div><div id="page-chat" class="page">
        <div style="flex:1; display:flex; flex-direction:column; padding: var(--spacing-md);">
          <div id="chat-messages" style="flex:1; overflow:auto; margin-bottom: var(--spacing-md);"></div>
          <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="输入消息…" style="flex:1; padding:10px var(--spacing-md); border-radius:var(--radius-input); border:none; box-shadow:var(--shadow-card);">
            <button id="chat-send" style="padding:10px 16px; border-radius:var(--radius-btn); border:none; background:var(--accent); color:#fff;">发送</button>
          </div>
        </div>
      </div>

      <div id="page-text" class="page">
        <div style="display:flex; flex-direction:column; padding:var(--spacing-md);">
          <div style="display:flex; gap:8px; margin-bottom:var(--spacing-md);">
            <button class="text-tab" data-tab="summary">总结</button>
            <button class="text-tab" data-tab="translate">翻译</button>
            <button class="text-tab" data-tab="rewrite">改写</button>
          </div>
          <textarea id="text-input" rows="6" placeholder="输入文本…" style="padding:12px var(--spacing-md); border-radius:var(--radius-input); border:none; box-shadow:var(--shadow-card); margin-bottom:var(--spacing-md);"></textarea>
          <button id="text-execute" style="padding:12px; border:none; border-radius:var(--radius-btn); background:var(--accent); color:#fff; margin-bottom:var(--spacing-md);">执行</button>
          <pre id="text-output" style="padding:12px; border-radius:var(--radius-card); background:var(--bg-card); box-shadow:var(--shadow-card); min-height:80px;"></pre>
        </div>
      </div>      <div id="page-json" class="page">
        <div style="display:flex; flex-direction:column; padding:var(--spacing-md);">
          <textarea
            id="json-input"
            rows="8"
            placeholder="粘贴JSON内容..."
            style="
              padding:12px var(--spacing-md);
              border:none;
              border-radius:var(--radius-input);
              background:var(--bg-card);
              box-shadow:var(--shadow-card);
              margin-bottom:var(--spacing-md);
              resize:none;
              font-family:monospace;
            "
          ></textarea>

          <button
            id="json-format"
            style="
              padding:12px;
              border:none;
              border-radius:var(--radius-btn);
              background:var(--accent);
              color:#fff;
              margin-bottom:var(--spacing-md);
            "
          >
            格式化
          </button>

          <button
            id="json-copy"
            style="
              padding:10px;
              border:none;
              border-radius:var(--radius-btn);
              background:#E5E5EA;
              margin-bottom:var(--spacing-md);
            "
          >
            复制结果
          </button>

          <pre
            id="json-output"
            style="
              flex:1;
              min-height:120px;
              padding:12px;
              background:var(--bg-card);
              border-radius:var(--radius-card);
              box-shadow:var(--shadow-card);
              overflow:auto;
              white-space:pre-wrap;
              word-break:break-all;
              font-family:monospace;
            "
          ></pre>
        </div>
      </div>

      <div id="page-calc" class="page">
        <div style="padding:var(--spacing-md); display:flex; flex-direction:column; height:100%;">

          <div
            id="calc-display"
            style="
              height:72px;
              background:var(--bg-card);
              border-radius:var(--radius-card);
              box-shadow:var(--shadow-card);
              display:flex;
              align-items:center;
              justify-content:flex-end;
              padding:0 20px;
              font-size:28px;
              margin-bottom:var(--spacing-md);
              overflow:hidden;
            "
          >
            0
          </div>

          <div id="calc-keys">

            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button class="calc-btn">AC</button>
              <button class="calc-btn">±</button>
              <button class="calc-btn">%</button>
              <button class="calc-btn">÷</button>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button class="calc-btn">7</button>
              <button class="calc-btn">8</button>
              <button class="calc-btn">9</button>
              <button class="calc-btn">×</button>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button class="calc-btn">4</button>
              <button class="calc-btn">5</button>
              <button class="calc-btn">6</button>
              <button class="calc-btn">−</button>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button class="calc-btn">1</button>
              <button class="calc-btn">2</button>
              <button class="calc-btn">3</button>
              <button class="calc-btn">＋</button>
            </div>

            <div style="display:flex; gap:8px;">
              <button class="calc-btn" style="flex:2;">0</button>
              <button class="calc-btn">.</button>
              <button
                class="calc-btn"
                style="
                  background:var(--accent);
                  color:#fff;
                "
              >=</button>
            </div>

          </div>

        </div>
      </div>

    </div>

    <div id="tab-bar">
      <button class="tab-btn active" data-page="home">🏠<br>首页</button>
      <button class="tab-btn" data-page="chat">🤖<br>AI</button>
      <button class="tab-btn" data-page="text">🔧<br>文本</button>
      <button class="tab-btn" data-page="json">⋯<br>更多</button>
    </div>

  </div>

  <script>const AppState = {
  currentPage: "home",
  prevPage: null,
  searchQuery: "",

  chat: {
    messages: [],
    isTyping: false
  },

  textTool: {
    activeTab: "summary",
    input: "",
    output: "",
    translateDir: "zh2en",
    rewriteStyle: "formal"
  },

  json: {
    input: "",
    output: "",
    error: null
  },

  calc: {
    expression: "",
    display: "0",
    justCalculated: false
  }
};

const tools = [
  {
    id: "chat",
    icon: "🤖",
    name: "AI Chat",
    desc: "智能对话助手"
  },
  {
    id: "text",
    icon: "📝",
    name: "文本工具",
    desc: "总结 / 翻译 / 改写"
  },
  {
    id: "json",
    icon: "📦",
    name: "JSON格式化",
    desc: "JSON 美化与校验"
  },
  {
    id: "calc",
    icon: "🧮",
    name: "计算器",
    desc: "基础计算工具"
  }
];

function renderHome() {
  const list = document.getElementById("tool-list");

  const keyword = AppState.searchQuery.trim();

  const filtered = tools.filter(tool => {
    return (
      tool.name.includes(keyword) ||
      tool.desc.includes(keyword)
    );
  });

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="tool-card">
        <div class="tool-title">未找到匹配工具</div>
        <div class="tool-desc">请尝试其它关键词</div>
      </div>
    `;
    return;
  }

  list.innerHTML = filtered.map(tool => `
    <div class="tool-card" onclick="openTool('${tool.id}')">
      <div style="font-size:32px;margin-bottom:8px;">
        ${tool.icon}
      </div>
      <div class="tool-title">
        ${tool.name}
      </div>
      <div class="tool-desc">
        ${tool.desc}
      </div>
    </div>
  `).join("");
}

function navigate(page) {

  document
    .querySelectorAll(".page")
    .forEach(p => p.classList.remove("active"));

  document
    .querySelectorAll(".tab-btn")
    .forEach(t => t.classList.remove("active"));

  document
    .getElementById("page-" + page)
    .classList.add("active");

  const tab = document.querySelector(
    `.tab-btn[data-page="${page}"]`
  );

  if (tab) {
    tab.classList.add("active");
  }

  AppState.prevPage = AppState.currentPage;
  AppState.currentPage = page;
}

function openTool(id) {

  switch (id) {

    case "chat":
      navigate("chat");
      break;

    case "text":
      navigate("text");
      break;

    case "json":
      navigate("json");
      break;

    case "calc":
      navigate("calc");
      break;

  }

}

document
  .getElementById("search-input")
  .addEventListener("input", function () {

    AppState.searchQuery = this.value;
    renderHome();

  });

document
  .querySelectorAll(".tab-btn")
  .forEach(btn => {

    btn.addEventListener("click", () => {

      navigate(btn.dataset.page);

    });

  });

renderHome();/* ==========================
   AI Chat 模块
========================== */

const chatInput = document.getElementById("chat-input");
const chatSend = document.getElementById("chat-send");
const chatMessages = document.getElementById("chat-messages");

const replyMap = {
  "你好": "你好，很高兴见到你！",
  "hello": "Hello! 👋",
  "帮我": "当然可以，请告诉我你需要什么帮助。",
  "json": "JSON 工具可以帮助你快速格式化数据。",
  "计算器": "计算器支持基础四则运算。",
  "翻译": "文本工具支持总结、翻译和改写。"
};

function renderMessages() {

  chatMessages.innerHTML = "";

  AppState.chat.messages.forEach(msg => {

    const bubble = document.createElement("div");

    bubble.className =
      "message " +
      (msg.role === "user"
        ? "user"
        : "ai");

    bubble.textContent = msg.text;

    chatMessages.appendChild(bubble);

  });

  chatMessages.scrollTop =
    chatMessages.scrollHeight;

}

function getMockReply(text) {

  for (const key in replyMap) {
    if (text.includes(key)) {
      return replyMap[key];
    }
  }

  return "这是 CWJ Tools Mobile OS 内置模拟回复，可以在后续升级时接入真实 AI API。";

}

function sendMessage() {

  const text =
    chatInput.value.trim();

  if (!text) return;

  AppState.chat.messages.push({
    role: "user",
    text: text,
    time: Date.now()
  });

  chatInput.value = "";

  renderMessages();

  AppState.chat.isTyping = true;

  setTimeout(() => {

    AppState.chat.messages.push({
      role: "ai",
      text: "正在思考...",
      time: Date.now()
    });

    renderMessages();

    setTimeout(() => {

      AppState.chat.messages.pop();

      AppState.chat.messages.push({
        role: "ai",
        text: getMockReply(text),
        time: Date.now()
      });

      AppState.chat.isTyping = false;

      renderMessages();

    }, 1000);

  }, 800);

}

chatSend.addEventListener(
  "click",
  sendMessage
);

chatInput.addEventListener(
  "keydown",
  function (e) {

    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }

  }
);

/* ==========================
   文本工具模块
========================== */

document
  .querySelectorAll(".text-tab")
  .forEach(btn => {

    btn.addEventListener(
      "click",
      () => {

        document
          .querySelectorAll(".text-tab")
          .forEach(b => b.classList.remove("active"));

        btn.classList.add("active");

        AppState.textTool.activeTab =
          btn.dataset.tab;

      }
    );

  });

document
  .getElementById("text-execute")
  .addEventListener(
    "click",
    () => {

      const input =
        document
          .getElementById("text-input")
          .value
          .trim();

      let output = "";

      switch (
        AppState.textTool.activeTab
      ) {

        case "summary":
          output =
            "• 关键内容一\n• 关键内容二\n• 关键内容三";
          break;

        case "translate":
          output =
            "[模拟翻译]\n" + input;
          break;

        case "rewrite":
          output =
            "[模拟改写]\n" + input;
          break;

      }

      document.getElementById(
        "text-output"
      ).textContent = output;

    }
  );/* ==========================
   JSON 工具模块
========================== */

const jsonInput =
  document.getElementById("json-input");

const jsonOutput =
  document.getElementById("json-output");

document
  .getElementById("json-format")
  .addEventListener("click", () => {

    const raw =
      jsonInput.value.trim();

    if (!raw) return;

    try {

      const obj =
        JSON.parse(raw);

      const formatted =
        JSON.stringify(
          obj,
          null,
          2
        );

      jsonOutput.textContent =
        formatted;

    } catch (e) {

      jsonOutput.textContent =
        "JSON格式错误：" + e.message;

    }

  });

document
  .getElementById("json-copy")
  .addEventListener("click", () => {

    const text =
      jsonOutput.textContent;

    if (!text) return;

    navigator.clipboard.writeText(text);

  });

/* ==========================
   计算器模块
========================== */

const calcDisplay =
  document.getElementById("calc-display");

const calcKeys =
  document.querySelectorAll(".calc-btn");

let expression = "";

function updateDisplay(value) {

  calcDisplay.textContent =
    value || "0";

}

function calculate(expr) {

  try {

    // 简单替换符号
    const safeExpr =
      expr
        .replace(/×/g, "*")
        .replace(/÷/g, "/")
        .replace(/＋/g, "+")
        .replace(/−/g, "-");

    return eval(safeExpr);

  } catch (e) {

    return "Error";

  }

}

calcKeys.forEach(key => {

  key.addEventListener("click", () => {

    const val =
      key.textContent.trim();

    if (val === "AC") {
      expression = "";
      updateDisplay("0");
      return;
    }

    if (val === "=") {

      const result =
        calculate(expression);

      updateDisplay(result);

      expression = result.toString();

      return;

    }

    if (val === "±") {
      if (expression) {
        expression =
          String(-parseFloat(expression));
        updateDisplay(expression);
      }
      return;
    }

    if (val === "%") {
      expression =
        String(parseFloat(expression) / 100);
      updateDisplay(expression);
      return;
    }

    expression += val;

    updateDisplay(expression);

  });

});

/* ==========================
   初始化
========================== */

function init() {

  renderHome();

  updateDisplay("0");

}

init();/* ==========================
   页面增强交互（动画/触感/优化）
========================== */

function addPageTransitionEffect(from, to) {
  const fromPage = document.getElementById("page-" + from);
  const toPage = document.getElementById("page-" + to);

  if (!fromPage || !toPage) return;

  fromPage.classList.remove("active");
  fromPage.classList.add("slide-out");

  setTimeout(() => {
    fromPage.classList.remove("slide-out");

    toPage.classList.add("active");
    toPage.classList.add("slide-in");

    setTimeout(() => {
      toPage.classList.remove("slide-in");
    }, 250);

  }, 200);
}

/* 覆盖原 navigate（升级动画版） */
function navigate(page) {

  const prev = AppState.currentPage;

  AppState.prevPage = prev;
  AppState.currentPage = page;

  // tab状态
  document.querySelectorAll(".tab-btn").forEach(t => {
    t.classList.remove("active");
    if (t.dataset.page === page) {
      t.classList.add("active");
    }
  });

  // 页面切换
  addPageTransitionEffect(prev, page);
}

/* Tab 点击事件（统一入口） */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    navigate(btn.dataset.page);
  });
});

/* 搜索框增强 */
const searchInput = document.getElementById("search-input");

searchInput.addEventListener("input", (e) => {
  AppState.searchQuery = e.target.value;
  renderHome();
});

/* 轻触反馈（兼容） */
function haptic() {
  if (navigator.vibrate) {
    navigator.vibrate(10);
  }
}

/* 给所有按钮加反馈 */
document.addEventListener("click", (e) => {
  if (e.target.tagName === "BUTTON") {
    haptic();
  }
});

/* 工具卡片点击反馈优化 */
function openTool(id) {
  haptic();

  if (id === "chat") navigate("chat");
  if (id === "text") navigate("text");
  if (id === "json") navigate("json");
  if (id === "calc") navigate("calc");
}

/* 自动滚动优化 */
const observer = new MutationObserver(() => {
  const chatBox = document.getElementById("chat-messages");
  if (chatBox) {
    chatBox.scrollTop = chatBox.scrollHeight;
  }
});

/* 初始化监听 */
setTimeout(() => {
  const chatBox = document.getElementById("chat-messages");
  if (chatBox) {
    observer.observe(chatBox, {
      childList: true
    });
  }
}, 500);/* ==========================
   收尾初始化（最终入口）
========================== */

window.addEventListener("load", () => {

  // 初始化首页
  renderHome();

  // 默认激活首页 Tab
  document.querySelectorAll(".tab-btn").forEach(t => {
    if (t.dataset.page === "home") {
      t.classList.add("active");
    }
  });

  // 初始页面状态
  AppState.currentPage = "home";

  // 防止 iOS 双击缩放
  document.addEventListener("gesturestart", e => e.preventDefault());

});

/* ==========================
   openTool 全局暴露（确保HTML可调用）
========================== */

window.openTool = openTool;
window.navigate = navigate;

/* ==========================
   HTML 结束
========================== */

</script>
</body>
</html>
