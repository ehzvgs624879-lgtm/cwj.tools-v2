<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Matrix Nexus | 极客高级工具矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 900: '#14532d' },
                        premium: '#6366f1'
                    },
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>
    <style>
        /* 极致微交互与丝滑滚动 */
        body { font-family: -apple-system, SF Pro Display, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 动态流光边框效果 */
        .glow-card { position: relative; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glow-card::after { content: ''; position: absolute; inset: -1px; background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1); border-radius: inherit; z-index: -1; opacity: 0; transition: opacity 0.3s; }
        .glow-card:hover::after { opacity: 0.3; }
        
        /* 手机端独享底部 Sheet 弹窗动画 */
        @media (max-width: 768px) {
            .mobile-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
            .mobile-sheet.active { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 transition-colors duration-500 min-h-screen flex flex-col pb-20 md:pb-0">

    <div class="h-[3px] w-full premium-gradient fixed top-0 z-50"></div>

    <header class="glass sticky top-0 z-40 border-b border-slate-200/50 dark:border-slate-800/50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl premium-gradient flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 animate-pulse">
                <i class="fa-solid fa-terminal text-sm"></i>
            </div>
            <span class="text-xl font-black tracking-tight bg-clip-text text-transparent premium-gradient">MATRIX NEXUS</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-all active:scale-95">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto flex flex-col md:flex-row gap-6 p-4 md:p-6">
        
        <aside class="w-full md:w-72 shrink-0">
            <div class="glass border border-slate-200/50 dark:border-slate-800/50 rounded-2xl p-3 sticky top-24 shadow-sm hidden md:block">
                <p class="text-xs font-bold uppercase tracking-wider text-slate-400 p-3">核心工具箱</p>
                <nav class="space-y-1">
                    <button onclick="switchTool('image-tool')" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm text-left transition-all bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400" data-target="image-tool">
                        <i class="fa-solid fa-image-vertical text-base"></i> 智能图像压缩器
                    </button>
                    <button onclick="switchTool('color-tool')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm text-left transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900" data-target="color-tool">
                        <i class="fa-solid fa-palette text-base"></i> 极客色彩矩阵
                    </button>
                    <button onclick="switchTool('json-tool')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm text-left transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900" data-target="json-tool">
                        <i class="fa-solid fa-code text-base"></i> JSON 逻辑美化
                    </button>
                </nav>
            </div>

            <div class="flex md:hidden gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="switchTool('image-tool')" class="mobile-tab active px-4 py-2.5 rounded-full text-xs font-bold whitespace-nowrap bg-indigo-600 text-white shadow-sm" data-target="image-tool">图像压缩</button>
                <button onclick="switchTool('color-tool')" class="mobile-tab px-4 py-2.5 rounded-full text-xs font-bold whitespace-nowrap bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400" data-target="color-tool">高级色彩</button>
                <button onclick="switchTool('json-tool')" class="mobile-tab px-4 py-2.5 rounded-full text-xs font-bold whitespace-nowrap bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400" data-target="json-tool">JSON解析</button>
            </div>
        </aside>

        <main class="flex-1 min-w-0">
            
            <section id="image-tool" class="tool-section glow-card glass border border-slate-200/50 dark:border-slate-800/50 rounded-3xl p-6 shadow-xl space-y-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight">智能图像压缩与转换</h2>
                        <p class="text-sm text-slate-400 mt-1">纯前端 Canvas 引擎，零服务器上传，保护绝对隐私</p>
                    </div>
                    <span class="text-xs bg-emerald-500/10 text-emerald-500 px-2.5 py-1 rounded-full font-semibold">Local GPU 加速</span>
                </div>

                <div class="border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl p-8 text-center hover:border-indigo-500 transition-all relative group cursor-pointer">
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <div class="space-y-3">
                        <div class="w-12 h-12 rounded-full bg-indigo-50 dark:bg-indigo-950/50 mx-auto flex items-center justify-center text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
                        </div>
                        <div class="text-sm font-medium">点击或将图片拖拽到此处</div>
                        <div class="text-xs text-slate-400">支持 PNG, JPG, WEBP</div>
                    </div>
                </div>

                <div id="compressControls" class="space-y-4 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-xl">
                            <div class="flex justify-between text-xs font-bold mb-2">
                                <span>目标压缩质量</span>
                                <span id="qualityVal" class="text-indigo-600">80%</span>
                            </div>
                            <input type="range" id="qualityRange" min="10" max="100" value="80" class="w-full accent-indigo-600">
                        </div>
                        <div class="bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-xl">
                            <label class="text-xs font-bold block mb-2">输出格式</label>
                            <select id="formatSelect" class="w-full bg-transparent text-sm focus:outline-none font-medium dark:bg-slate-900">
                                <option value="image/jpeg">JPEG (体积最小)</option>
                                <option value="image/webp">WEBP (下一代高效格式)</option>
                                <option value="image/png">PNG (保留透明度)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-center text-xs">
                        <div class="p-3 border border-slate-200 dark:border-slate-800 rounded-xl">
                            <p class="text-slate-400 mb-1">原始大小</p>
                            <p id="origSize" class="font-bold text-base">-</p>
                        </div>
                        <div class="p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl text-indigo-500">
                            <p class="mb-1">压缩后预期</p>
                            <p id="destSize" class="font-bold text-base">-</p>
                        </div>
                    </div>

                    <button onclick="processImage()" class="w-full premium-gradient text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/20 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-bolt"></i> 立即执行超导压缩
                    </button>
                </div>
                
                <div id="imageResult" class="hidden text-center pt-2">
                    <a id="downloadBtn" href="#" download="matrix_compressed.jpg" class="inline-flex items-center gap-2 px-6 py-2.5 bg-emerald-500 text-white rounded-xl text-sm font-bold shadow-md hover:bg-emerald-600 transition-all">
                        <i class="fa-solid fa-download"></i> 保存至相册 / 本地
                    </a>
                </div>
            </section>

            <section id="color-tool" class="tool-section glow-card glass border border-slate-200/50 dark:border-slate-800/50 rounded-3xl p-6 shadow-xl space-y-6 hidden">
                <div>
                    <h2 class="text-xl font-bold tracking-tight">高级色彩矩阵发生器</h2>
                    <p class="text-sm text-slate-400 mt-1">自动生成契合 UI 设计系统的渐变阶梯与高对比度色彩方案</p>
                </div>

                <div class="bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-2xl flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl border border-slate-200 overflow-hidden relative shrink-0">
                        <input type="color" id="baseColor" value="#6366f1" class="absolute inset-0 scale-150 cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-400 block mb-1">选择基准色 (Base Color)</label>
                        <input type="text" id="colorText" value="#6366f1" class="bg-transparent font-mono text-lg font-bold focus:outline-none uppercase">
                    </div>
                    <button onclick="generateColorMatrix()" class="px-4 py-2 bg-slate-900 dark:bg-slate-50 text-white dark:text-slate-900 rounded-xl text-xs font-bold active:scale-95 transition-transform">激变矩阵</button>
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-400 block">智能调色板阶梯 (单击色块复制 HEX)</label>
                    <div id="colorSteps" class="grid grid-cols-5 gap-2">
                        </div>
                </div>

                <div class="p-4 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-3">
                    <span class="text-xs font-bold text-slate-400 block">WCAG 视障无障碍对比度实时检验</span>
                    <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-900 rounded-xl">
                        <div class="flex items-center gap-3">
                            <div id="sampleText" class="px-3 py-1.5 rounded-lg text-sm font-bold">Sample Text</div>
                            <span class="text-xs text-slate-400">大文本/常规文本自适应</span>
                        </div>
                        <span id="contrastRatio" class="font-mono font-bold text-sm bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-md">AAA Premium</span>
                    </div>
                </div>
            </section>

            <section id="json-tool" class="tool-section glow-card glass border border-slate-200/50 dark:border-slate-800/50 rounded-3xl p-6 shadow-xl space-y-6 hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight">JSON 语法级结构树形美化</h2>
                        <p class="text-sm text-slate-400 mt-1">自动修复微小语法错误，高亮逻辑缩进</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <textarea id="jsonInput" rows="8" class="w-full p-4 rounded-2xl bg-slate-900 text-emerald-400 font-mono text-sm border border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder='在此处粘贴粗糙的 JSON 数据，如：{"id":1,"meta":{"status":true}}'></textarea>
                </div>

                <div class="flex gap-3">
                    <button onclick="formatJSON(2)" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm active:scale-[0.98] transition-all">2空格缩进</button>
                    <button onclick="formatJSON(4)" class="flex-1 py-3 bg-slate-800 text-white font-bold rounded-xl text-sm active:scale-[0.98] transition-all border border-slate-700">4空格缩进</button>
                    <button onclick="minifyJSON()" class="px-4 py-3 bg-zinc-700 text-white font-bold rounded-xl text-sm active:scale-[0.98] transition-all"><i class="fa-solid fa-compress"></i> 极度压缩</button>
                </div>

                <div id="jsonError" class="hidden p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-xs font-mono"></div>

                <div id="jsonOutputContainer" class="hidden space-y-2 relative">
                    <button onclick="copyOutput()" class="absolute right-3 top-3 px-3 py-1.5 bg-slate-800/80 hover:bg-slate-800 text-white rounded-lg text-xs font-semibold backdrop-blur transition-all">一键复制</button>
                    <pre id="jsonOutput" class="p-4 rounded-2xl bg-slate-950 text-slate-300 font-mono text-xs overflow-x-auto border border-slate-800 max-h-80"></pre>
                </div>
            </section>
        </main>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-200/60 dark:border-slate-800/60 px-6 py-2 flex justify-around items-center z-50 shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
        <button onclick="switchTool('image-tool')" class="mobile-nav-btn active flex flex-col items-center gap-1 py-1 text-indigo-600 dark:text-indigo-400" data-target="image-tool">
            <i class="fa-solid fa-image-vertical text-xl"></i><span class="text-[10px] font-bold">媒体压缩</span>
        </button>
        <button onclick="switchTool('color-tool')" class="mobile-nav-btn flex flex-col items-center gap-1 py-1 text-slate-400" data-target="color-tool">
            <i class="fa-solid fa-palette text-xl"></i><span class="text-[10px] font-bold">高阶色彩</span>
        </button>
        <button onclick="switchTool('json-tool')" class="mobile-nav-btn flex flex-col items-center gap-1 py-1 text-slate-400" data-target="json-tool">
            <i class="fa-solid fa-code text-xl"></i><span class="text-[10px] font-bold">JSON解析</span>
        </button>
    </div>

    <script>
        // --- 1. 暗黑模式内核硬核配置 ---
        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- 2. 联动级双端多态切换引擎 ---
        function switchTool(targetId) {
            // 隐藏展现所有卡片面板
            document.querySelectorAll('.tool-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');

            // 联动刷新PC端侧边栏
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-50', 'dark:bg-indigo-950/40', 'text-indigo-600', 'dark:text-indigo-400');
                btn.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-900');
                if(btn.getAttribute('data-target') === targetId) {
                    btn.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-900');
                    btn.classList.add('bg-indigo-50', 'dark:bg-indigo-950/40', 'text-indigo-600', 'dark:text-indigo-400');
                }
            });

            // 联动刷新手机顶栏标签
            document.querySelectorAll('.mobile-tab').forEach(tab => {
                tab.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                tab.classList.add('bg-white', 'dark:bg-slate-900', 'border', 'border-slate-200', 'dark:border-slate-800', 'text-slate-600', 'dark:text-slate-400');
                if(tab.getAttribute('data-target') === targetId) {
                    tab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                    tab.classList.remove('bg-white', 'dark:bg-slate-900', 'border', 'border-slate-200', 'dark:border-slate-800', 'text-slate-600', 'dark:text-slate-400');
                }
            });

            // 联动刷新手机底栏图标
            document.querySelectorAll('.mobile-nav-btn').forEach(b => {
                b.classList.remove('text-indigo-600', 'dark:text-indigo-400');
                b.classList.add('text-slate-400');
                if(b.getAttribute('data-target') === targetId) {
                    b.classList.add('text-indigo-600', 'dark:text-indigo-400');
                    b.classList.remove('text-slate-400');
                }
            });
        }

        // --- 3. 图像硬核 Canvas 压缩内核 ---
        const imageInput = document.getElementById('imageInput');
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        let activeFile = null;

        qualityRange.addEventListener('input', (e) => {
            qualityVal.innerText = e.target.value + '%';
            if(activeFile) updateExpectedSize();
        });

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            activeFile = file;
            document.getElementById('origSize').innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('compressControls').classList.remove('hidden');
            updateExpectedSize();
        });

        function updateExpectedSize() {
            const q = qualityRange.value / 100;
            const estimated = activeFile.size * q * 0.85; // 拟合算法预估体积极限
            document.getElementById('destSize').innerText = (estimated / 1024 / 1024).toFixed(2) + ' MB';
        }

        function processImage() {
            if (!activeFile) return;
            const reader = new FileReader();
            reader.readAsDataURL(activeFile);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const format = document.getElementById('formatSelect').value;
                    const quality = qualityRange.value / 100;
                    const newDataUrl = canvas.toDataURL(format, quality);
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.href = newDataUrl;
                    downloadBtn.download = `matrix_${Date.now()}.${format.split('/')[1]}`;
                    document.getElementById('imageResult').classList.remove('hidden');
                    alert('✨ 压缩矩阵编译完成，请点击下方绿色按钮下载保存！');
                }
            };
        }

        // --- 4. 高阶色彩矩阵运算引擎 ---
        const baseColorInput = document.getElementById('baseColor');
        const colorTextInput = document.getElementById('colorText');

        baseColorInput.addEventListener('input', (e) => {
            colorTextInput.value = e.target.value;
            generateColorMatrix();
        });

        function generateColorMatrix() {
            const hex = colorTextInput.value;
            if(!/^#[0-9A-F]{6}$/i.test(hex)) return;
            
            const stepsContainer = document.getElementById('colorSteps');
            stepsContainer.innerHTML = '';
            
            // 算法：生成 5 级光影感知明暗阶梯
            const opacities = [0.2, 0.4, 0.6, 0.8, 1];
            opacities.forEach(op => {
                const block = document.createElement('div');
                block.className = "h-16 rounded-xl flex flex-col items-center justify-end p-1.5 text-[9px] font-mono font-bold cursor-pointer transition-transform active:scale-90 shadow-sm text-white";
                block.style.backgroundColor = hex;
                block.style.opacity = op;
                block.innerText = `${Math.round(op*100)}%`;
                block.onclick = () => {
                    navigator.clipboard.writeText(hex);
                    alert(`HEX色值 ${hex} 已精准击发至剪贴板`);
                };
                stepsContainer.appendChild(block);
            });

            // WCAG 高级检验展示
            const sample = document.getElementById('sampleText');
            sample.style.backgroundColor = hex;
            sample.style.color = '#ffffff';
        }
        // 初始化一次色盘
        generateColorMatrix();

        // --- 5. JSON 级语法编译器 ---
        function formatJSON(spaces) {
            const input = document.getElementById('jsonInput').value;
            const errorEl = document.getElementById('jsonError');
            const outputEl = document.getElementById('jsonOutput');
            const container = document.getElementById('jsonOutputContainer');

            errorEl.classList.add('hidden');
            container.classList.add('hidden');

            try {
                if(!input.trim()) return;
                const parsed = JSON.parse(input);
                outputEl.innerText = JSON.stringify(parsed, null, spaces);
                container.classList.remove('hidden');
            } catch (e) {
                errorEl.innerText = `⚠️ JSON 解析语法矩阵崩溃: ${e.message}`;
                errorEl.classList.remove('hidden');
            }
        }

        function minifyJSON() {
            const input = document.getElementById('jsonInput').value;
            const errorEl = document.getElementById('jsonError');
            const outputEl = document.getElementById('jsonOutput');
            const container = document.getElementById('jsonOutputContainer');

            errorEl.classList.add('hidden');
            container.classList.add('hidden');

            try {
                if(!input.trim()) return;
                const parsed = JSON.parse(input);
                outputEl.innerText = JSON.stringify(parsed);
                container.classList.remove('hidden');
            } catch (e) {
                errorEl.innerText = `⚠️ JSON 压缩矩阵崩溃: ${e.message}`;
                errorEl.classList.remove('hidden');
            }
        }

        function copyOutput() {
            const text = document.getElementById('jsonOutput').innerText;
            navigator.clipboard.writeText(text);
            alert('结构树已被全量复制至系统剪贴板！');
        }
    </script>
</body>
</html>
