<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡️ MATRIX ⚡️</title>
    <style>
        body { margin: 0; height: 100vh; background: #050508; overflow: hidden; font-family: system-ui, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 90vw; max-width: 400px; aspect-ratio: 1; }
        .pad { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; position: relative; overflow: hidden; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        .pad::after { content: ''; position: absolute; inset: 0; border-radius: 16px; box-shadow: inset 0 0 15px transparent; transition: all 0.3s; }
        .pad:active { transform: scale(0.92); background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; }
        .pad:active::after { box-shadow: inset 0 0 20px #00f2fe, 0 0 30px rgba(0,242,254,0.3); }
        /* 不同的格子给不同的霓虹光晕 */
        .pad:nth-child(3n+1):active { border-color: #ff007f; background: rgba(255,0,127,0.1); }
        .pad:nth-child(3n+1):active::after { box-shadow: inset 0 0 20px #ff007f, 0 0 30px rgba(255,0,127,0.3); }
        .pad:nth-child(3n+2):active { border-color: #7000ff; background: rgba(112,0,255,0.1); }
        .pad:nth-child(3n+2):active::after { box-shadow: inset 0 0 20px #7000ff, 0 0 30px rgba(112,0,255,0.3); }
        .hint { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 3px; margin-top: 30px; text-transform: uppercase; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="grid">
        <!-- 9个科技感触控板 -->
        <div class="pad" onclick="synth(261.63, 'triangle')"></div>
        <div class="pad" onclick="synth(293.66, 'square')"></div>
        <div class="pad" onclick="synth(329.63, 'sine')"></div>
        <div class="pad" onclick="synth(349.23, 'triangle')"></div>
        <div class="pad" onclick="synth(392.00, 'sawtooth')"></div>
        <div class="pad" onclick="synth(440.00, 'sine')"></div>
        <div class="pad" onclick="synth(493.88, 'triangle')"></div>
        <div class="pad" onclick="synth(523.25, 'square')"></div>
        <div class="pad" onclick="synth(587.33, 'sawtooth')"></div>
    </div>

    <div class="hint">⚡️ TAP THE MATRIX TO GENERATE AUDIO BEAT ⚡️</div>

    <script>
        // 手机原生音频合成引擎（Web Audio API）
        let audioCtx = null;
        function synth(freq, type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // 营造赛博空间回音感（淡出衰减）
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }
    </script>
</body>
</html>
</html>
