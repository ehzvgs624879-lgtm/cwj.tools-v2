<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CWJ TOOLS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05060a;
  color:#fff;
}

.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #4f46e5, transparent),
    radial-gradient(circle at 80% 20%, #06b6d4, transparent),
    radial-gradient(circle at 50% 80%, #a855f7, transparent);
  filter:blur(120px);
  opacity:.45;
  z-index:-1;
}

.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:200px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebar button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
}

.main{
  flex:1;
  padding:15px;
}

.page{display:none;}textarea{
  width:100%;
  height:120px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.output{
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.tool{
  padding:20px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

@media(max-width:768px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;}
  .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- sidebar -->
<div class="sidebar">
  <button onclick="setPage('chat')">AI</button>
  <button onclick="setPage('tools')">Tools</button>
  <button onclick="setPage('system')">System</button>
</div>

<!-- main -->
<div class="main">

  <!-- chat -->
  <div id="chatPage" class="page active">
    <h2>AI Chat</h2>

    <textarea id="input"></textarea>
    <button onclick="send()">发送</button>

    <div id="output"></div>
  </div><!-- tools -->
  <div id="toolsPage" class="page">
    <div class="grid">

      <div class="tool" onclick="send()">AI聊天</div>
      <div class="tool" onclick="translateTool()">翻译</div>
      <div class="tool" onclick="searchTool()">搜索</div>
      <div class="tool" onclick="fileTool()">文件</div>

    </div>
  </div>

  <!-- system -->
  <div id="systemPage" class="page">
    <h2>System</h2>
    <p>API: ONLINE</p>
    <p>STATUS: OK</p>
  </div>

</div>
<script>

function setPage(p){
  document.querySelectorAll('.page')
    .forEach(x=>x.classList.remove('active'));
  document.getElementById(p+'Page').classList.add('active');
}

function show(text){
  document.getElementById("output").innerHTML = text;
}

/* AI */
async function send(){

  const input=document.getElementById('input');
  const output=document.getElementById('output');

  const msg=input.value.trim();

  if(!msg){
    output.innerHTML='请输入内容';
    return;
  }

  output.innerHTML='AI思考中...';

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    output.innerHTML='👉 '+data.reply;

  }catch(e){
    output.innerHTML='请求失败';
  }
}

/* 翻译 */
function translateTool(){

  const text=document.getElementById("input").value.trim() || "hello";

  show(`
    🌍 翻译结果<br><br>
    原文：${text}<br>
    结果：${text}（已翻译模拟）
  `);
}

/* 搜索 */
function searchTool(){

  const text=document.getElementById("input").value.trim() || "AI";

  show(`
    🔍 搜索结果<br><br>
    ${text} 相关内容：<br>
    1. 结果A<br>
    2. 结果B<br>
    3. 结果C
  `);
}

/* 文件 */
function fileTool(){

  show(`
    📁 文件系统<br><br>
    - index.html<br>
    - style.css<br>
    - app.js<br>
    - api/chat.js
  `);
}

</script>

</body>
</html>
</div>
.page.active{display:block;}
