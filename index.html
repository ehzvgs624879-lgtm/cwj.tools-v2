<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile Holographic Warp</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #050706;
            touch-action: none; font-family: -apple-system, sans-serif;
        }
        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 1; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <script>
        // 1. 创建符合手机竖屏比例 (9:16) 的超高清虚拟画布
        const textureCanvas = document.createElement('canvas');
        textureCanvas.width = 1200;   // 窄变高，更适合手机
        textureCanvas.height = 2000;
        const ctx = textureCanvas.getContext('2d');

        // 极奢暗色钛金底
        ctx.fillStyle = '#111412'; ctx.fillRect(0, 0, 1200, 2000);

        // 手机端精细栅格网
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 2;
        for(let i = 0; i < 2000; i += 100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 2000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1200, i); ctx.stroke();
        }

        // 核心修正：大字换行排版，确保手机端完美居中显示
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 84px "Helvetica Neue", Arial, sans-serif';
        ctx.fillText('DESIGNED FOR', 100, 380);
        ctx.fillText('PERFORMANCE', 100, 490); // 换行，绝不切字

        ctx.font = '100 42px "Helvetica Neue", sans-serif';
        ctx.fillStyle = '#3ae397';
        ctx.fillText('Built to run fluidly at 60FPS.', 100, 590);
        ctx.fillText('Fully mobile GPU optimized.', 100, 640);

        ctx.fillStyle = '#888888';
        ctx.font = '30px "Courier New", monospace';
        const paragraphs = [
            "// MOBILE CONTEXT: INITIALIZED",
            "// INTERACTION: TRUE TOUCH",
            "// HARDWARE THREAD: ACTIVE",
            "// RESTRUCTURED BY CWJ-TOOLS // 2026"
        ];
        paragraphs.forEach((line, i) => ctx.fillText(line, 100, 800 + i * 70));

        // 极简反射模块块
        ctx.fillStyle = '#ffffff'; ctx.fillRect(100, 1150, 1000, 450);
        ctx.fillStyle = '#000000'; ctx.font = 'bold 46px sans-serif';
        ctx.fillText('INTELLIGENT MATRIX', 160, 1390);
        // 2. 顶点着色器：为手机端微调了触控点和变形范围
        const vertexShader = `
            uniform float u_time;
            uniform vec2 u_pointer;
            uniform float u_intensity;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying float vWave;

            void main() {
                vUv = uv;
                vec3 pos = position;

                // 丝绸飘动感
                float waveX = sin(pos.x * 0.5 + u_time * 1.4) * cos(pos.y * 0.3 + u_time * 1.0);
                float waveY = cos(pos.y * 0.6 - u_time * 1.1) * sin(pos.x * 0.4 + u_time * 0.8);
                float baseWave = (waveX + waveY) * 0.2;

                // 触控感应范围修正
                float dist = distance(pos.xy, u_pointer * vec2(2.0, 3.5));
                float touch = smoothstep(2.5, 0.0, dist) * u_intensity;
                
                pos.z += baseWave + (touch * 1.5);
                vWave = baseWave + touch;

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                vNormal = normalize(normalMatrix * normal);
                
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        // 片元着色器：液态银 + 边缘彩虹全息偏光
        const fragmentShader = `
            uniform sampler2D u_texture;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying float vWave;

            void main() {
                vec4 texColor = texture2D(u_texture, vUv);
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                
                float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.0);
                vec3 rainbow = 0.5 + 0.5 * cos(6.28318 * (vWave * 0.6 + vec3(0.0, 0.33, 0.67)));
                float specular = pow(max(dot(reflect(-viewDir, normal), normal), 0.0), 16.0);

                vec3 baseColor = texColor.rgb * (0.75 + vWave * 0.15);
                vec3 finalColor = mix(baseColor, rainbow, fresnel * 0.35);
                finalColor += vec3(specular * 0.3);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // 3. 场景初始化
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const pageTexture = new THREE.CanvasTexture(textureCanvas);
        
        // 核心修正：纸张比例变成 3.8 x 6.4 (完美契合手机竖向屏幕)
        const geometry = new THREE.PlaneGeometry(3.8, 6.4, 150, 150);

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader, fragmentShader: fragmentShader,
            side: THREE.DoubleSide,
            uniforms: {
                u_texture: { value: pageTexture }, u_time: { value: 0.0 },
                u_pointer: { value: new THREE.Vector2(0, 0) }, u_intensity: { value: 0.0 }
            }
        });

        const pageMesh = new THREE.Mesh(geometry, material);
        pageMesh.rotation.set(-0.1, -0.15, 0.02); // 减小倾斜度，在窄屏里显得更大更清晰
        scene.add(pageMesh);
        // 4. 触控与手机自适应物理学
        let pointer = new THREE.Vector2(0, 0);
        let targetIntensity = 0.0;
        let currentIntensity = 0.0;

        function updatePointer(x, y) {
            pointer.x = (x / window.innerWidth) * 2 - 1;
            pointer.y = -(y / window.innerHeight) * 2 + 1;
        }

        // 核心修正：智能自适应缩放函数，确保无论手机屏幕多窄，3D网格都能完美贴合屏幕宽度
        function handleResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);

            const aspect = width / height;
            if (aspect < 1) { 
                // 如果是手机竖屏，根据屏幕比例动态缩小网格，防止文字冲出屏幕
                pageMesh.scale.setScalar(aspect * 1.5);
            } else {
                pageMesh.scale.setScalar(1.0);
            }
        }

        // 手机端专属的高灵敏度原生事件绑定
        window.addEventListener('touchmove', (e) => { 
            if(e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY); 
        }, { passive: true });
        
        window.addEventListener('touchstart', (e) => { 
            targetIntensity = 1.0; 
            if(e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY); 
        }, { passive: true });
        
        window.addEventListener('touchend', () => targetIntensity = 0.0);

        // 同时也兼容 PC 鼠标流
        window.addEventListener('pointermove', (e) => updatePointer(e.clientX, e.clientY));
        window.addEventListener('pointerdown', (e) => { targetIntensity = 1.0; updatePointer(e.clientX, e.clientY); });
        window.addEventListener('pointerup', () => targetIntensity = 0.0);

        window.addEventListener('resize', handleResize);
        handleResize(); // 启动时立即执行一次缩放校准

        const clock = new THREE.Clock();

        // 5. 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            currentIntensity += (targetIntensity - currentIntensity) * 0.08;

            material.uniforms.u_time.value = time;
            material.uniforms.u_pointer.value.lerp(pointer, 0.1);
            material.uniforms.u_intensity.value = currentIntensity;

            // 柔和的整体空间慢速摆动
            pageMesh.rotation.y = -0.15 + Math.sin(time * 0.4) * 0.02;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
