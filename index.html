<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Advanced Quantum Core</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020403; /* 更深邃的宇宙黑 */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            touch-action: none; /* 阻止手机浏览器默认的下拉刷新 */
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            bottom: 12%;
            width: 100%;
            text-align: center;
            z-index: 10;
            color: #ffffff;
            pointer-events: none;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 12px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        p {
            font-size: 0.75rem;
            color: #3ae397;
            margin: 0;
            letter-spacing: 4px;
            opacity: 0.7;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="webgl-container"></div>
    <div class="ui-overlay">
        <h1>Quantum Core</h1>
        <p>HOLD SCREEN TO IGNITE</p>
    </div>
    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 高级数学算法：使用 Fibonacci Sphere 生成均匀分布的 3D 粒子球
        const count = 5000;
        const radius = 9;
        const positions = new Float32Array(count * 3);
        const basePositions = new Float32Array(count * 3); // 记录原始坐标用于弹性回弹
        
        const phi = Math.PI * (3 - Math.sqrt(5)); // 黄金角

        for (let i = 0; i < count; i++) {
            let y = 1 - (i / (count - 1)) * 2; 
            let r = Math.sqrt(1 - y * y);
            let theta = phi * i;

            // 加入一点随机噪波，让球体看起来更像有机物而不是死板的几何体
            let noise = 1 + (Math.random() - 0.5) * 0.1;
            
            let x = Math.cos(theta) * r;
            let z = Math.sin(theta) * r;

            let idx = i * 3;
            positions[idx] = x * radius * noise;
            positions[idx + 1] = y * radius * noise;
            positions[idx + 2] = z * radius * noise;

            basePositions[idx] = positions[idx];
            basePositions[idx + 1] = positions[idx + 1];
            basePositions[idx + 2] = positions[idx + 2];
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // 材质升级：高亮发光效果
        const material = new THREE.PointsMaterial({
            color: 0x3ae397, 
            size: 0.18,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending 
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        // 交互状态控制
        let isTouching = false;
        let touchStrength = 0; // 0 到 1 之间的平滑过渡值

        const handleTouchStart = () => { isTouching = true; };
        const handleTouchEnd = () => { isTouching = false; };

        // 兼容 PC 和 手机
        window.addEventListener('mousedown', handleTouchStart);
        window.addEventListener('mouseup', handleTouchEnd);
        window.addEventListener('touchstart', handleTouchStart, { passive: false });
        window.addEventListener('touchend', handleTouchEnd);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        const baseColor = new THREE.Color(0x3ae397); // 初始色：苔藓绿
        const burstColor = new THREE.Color(0x00f3ff); // 爆发色：赛博青

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            
            // 阻尼算法：让数值平滑过渡，产生“弹性”的视觉效果
            const targetStrength = isTouching ? 1 : 0;
            touchStrength += (targetStrength - touchStrength) * 0.08;

            // 整个星系的三维缓慢自转，触摸时加速旋转
            particleSystem.rotation.y = time * 0.15 + (touchStrength * time * 0.5);
            particleSystem.rotation.x = Math.sin(time * 0.2) * 0.2;
            particleSystem.rotation.z = touchStrength * 0.5;

            const posAttribute = geometry.attributes.position;
            const posArray = posAttribute.array;

            // 核心动画循环：对 5000 个粒子进行重新计算
            for (let i = 0; i < count; i++) {
                let idx = i * 3;
                let bx = basePositions[idx];
                let by = basePositions[idx + 1];
                let bz = basePositions[idx + 2];

                // 爆发波纹算法：利用 sin 结合粒子索引生成美丽的螺旋爆炸干涉纹理
                let wave = Math.sin(i * 0.05 + time * 5) * 0.8;
                
                // 触摸强度控制粒子的膨胀因子
                let burstFactor = 1 + touchStrength * (0.8 + wave);

                posArray[idx] = bx * burstFactor;
                posArray[idx + 1] = by * burstFactor;
                posArray[idx + 2] = bz * burstFactor;
            }

            // 动态色彩渐变 (Color Lerping)
            material.color.lerpColors(baseColor, burstColor, touchStrength);

            posAttribute.needsUpdate = true;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
